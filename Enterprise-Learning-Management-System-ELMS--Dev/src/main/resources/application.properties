# application.properties


spring.application.name=user-management-service

# =========================================================
# SERVER CONFIGURATION
# =========================================================
server.port=8080
server.servlet.context-path=/

# =========================================================
# DATABASE CONFIGURATION
# =========================================================
//spring.datasource.url=jdbc:mysql://localhost:3306/lms_user_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/lms_userservice_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Ashok@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================================
# JPA / HIBERNATE CONFIGURATION
# =========================================================
spring.jpa.hibernate.ddl-auto=update
//spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Hibernate 6 auto-detects the MySQL dialect.
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# =========================================================
# HIKARI CONNECTION POOL
# =========================================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# =========================================================
# JWT CONFIGURATION
# =========================================================
jwt.secret=${JWT_SECRET:CHANGE_ME_TO_A_64_BYTE_SECRET_FOR_LOCAL_DEV_ONLY_1234567890}
jwt.access-token-expiration=86400000
jwt.refresh-token-expiration=604800000

# =========================================================
# REDIS CONFIGURATION
# =========================================================
#TODO: Redis is temporarily disabled. Re-enable these properties with the "redis" profile when Redis is available.
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=60000


#spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# =========================================================
# MAIL CONFIGURATION
# =========================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:bhargavpenamsetti@gmail.com}
spring.mail.password=${MAIL_PASSWORD:wfmo ikag hrll fnhc}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# =========================================================
# FILE UPLOAD CONFIGURATION
# =========================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

file.upload-dir=uploads/

# =========================================================
# SWAGGER / OPENAPI CONFIGURATION
# =========================================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# =========================================================
# LOGGING CONFIGURATION
# =========================================================
logging.level.root=INFO
logging.level.org.springframework.security=${SPRING_SECURITY_LOG_LEVEL:INFO}
logging.level.com.lms.usermanagementservice=DEBUG

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# =========================================================
# JACKSON CONFIGURATION
# =========================================================
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
spring.jackson.default-property-inclusion=non_null

# =========================================================
# ACTUATOR CONFIGURATION
# =========================================================
management.endpoints.web.exposure.include=${ACTUATOR_EXPOSURE:health,info}
management.endpoint.health.show-details=${ACTUATOR_HEALTH_DETAILS:when_authorized}

# =========================================================
# CACHE CONFIGURATION
# =========================================================
# TODO: Redis cache is temporarily disabled until Redis is installed again.
spring.cache.type=none

# =========================================================
# SECURITY CONFIGURATION
# =========================================================
security.allowed.origins=http://localhost:3000

# =========================================================
# OAUTH2 CONFIGURATION - GOOGLE
# =========================================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:YOUR_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# =========================================================
# OAUTH2 CONFIGURATION - GITHUB
# =========================================================
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:YOUR_GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:YOUR_GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=user:email

# =========================================================
# OAUTH2 CONFIGURATION - MICROSOFT
# =========================================================
spring.security.oauth2.client.registration.microsoft.client-id=${MICROSOFT_CLIENT_ID:YOUR_MICROSOFT_CLIENT_ID}
spring.security.oauth2.client.registration.microsoft.client-secret=${MICROSOFT_CLIENT_SECRET:YOUR_MICROSOFT_CLIENT_SECRET}
spring.security.oauth2.client.registration.microsoft.scope=openid,profile,email
spring.security.oauth2.client.registration.microsoft.provider=microsoft
spring.security.oauth2.client.registration.microsoft.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.microsoft.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.microsoft.authorization-uri=https://login.microsoftonline.com/common/oauth2/v2.0/authorize
spring.security.oauth2.client.provider.microsoft.token-uri=https://login.microsoftonline.com/common/oauth2/v2.0/token
spring.security.oauth2.client.provider.microsoft.jwk-set-uri=https://login.microsoftonline.com/common/discovery/v2.0/keys
spring.security.oauth2.client.provider.microsoft.user-info-uri=https://graph.microsoft.com/oidc/userinfo
spring.security.oauth2.client.provider.microsoft.user-name-attribute=sub

# =========================================================
# TIMEZONE CONFIGURATION
# =========================================================
spring.jackson.time-zone=Asia/Kolkata

# =========================================================
# DEVTOOLS CONFIGURATION
# =========================================================
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

eureka.instance.prefer-ip-address=true
